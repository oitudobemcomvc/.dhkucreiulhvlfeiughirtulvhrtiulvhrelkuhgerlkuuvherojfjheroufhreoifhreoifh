<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Real Acessível</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: sans-serif; }
        .vision-canvas { border: 4px solid #3b82f6; box-shadow: 0 0 30px #1d4ed8; }
        .high-contrast { background: #000 !important; color: #fff000 !important; }
        .high-contrast .btn { border: 3px solid #fff000 !important; color: #fff000 !important; }
        .chat-area { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="w-full max-w-xl flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black tracking-tighter text-blue-500">SISTEMA NEURAL</h1>
        <button onclick="toggleContrast()" class="p-2 border border-slate-700 rounded-lg">🌓</button>
    </header>

    <main class="w-full max-w-xl space-y-6">
        <div class="relative rounded-3xl overflow-hidden vision-canvas">
            <video id="webcam" autoplay muted playsinline class="w-full aspect-video object-cover"></video>
            <div id="ai-overlay" class="absolute top-4 left-4 bg-blue-600/80 px-3 py-1 rounded-full text-xs font-bold animate-pulse">
                IA ATIVA
            </div>
        </div>

        <div class="chat-area rounded-3xl p-6 min-h-[120px] border border-slate-800">
            <p id="ai-status" class="text-blue-400 text-xs font-bold uppercase mb-2">Monitorando...</p>
            <p id="ai-output" class="text-lg font-medium">Estou pronta. O que você quer que eu analise ou sobre o que quer conversar?</p>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <button onclick="analyzeScene()" class="btn bg-blue-600 hover:bg-blue-500 text-white font-bold py-6 rounded-2xl shadow-2xl transition-all active:scale-95 text-xl">
                👁️ ESCANEAR AMBIENTE
            </button>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startVoiceChat()" class="btn bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    🎙️ CONVERSAR
                </button>
                <button onclick="window.speechSynthesis.cancel()" class="btn bg-red-900/30 hover:bg-red-800 py-4 rounded-2xl font-bold">
                    🛑 CALAR IA
                </button>
            </div>
        </div>
    </main>

    <script>
        let model;
        const video = document.getElementById('webcam');
        const output = document.getElementById('ai-output');
        const synth = window.speechSynthesis;

        // Inicia Hardware e IA
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                model = await mobilenet.load();
                speak("Sistema Neural Rafael carregado. Eu vejo e entendo você.");
            } catch (e) {
                output.innerText = "Erro: Sem acesso à câmera.";
            }
        }

        // IA Visual Real (Análise de Imagem)
        async function analyzeScene() {
            if (!model) return;
            output.innerText = "Analisando padrões visuais...";
            
            const predictions = await model.classify(video);
            const item = predictions[0].className.split(',')[0];
            
            // Lógica de resposta baseada na visão
            const text = `Eu detectei um ${item}. No contexto atual, isso parece ser o objeto mais relevante à sua frente. Como posso te ajudar com isso?`;
            updateAI(text);
        }

        // IA de Conversa (Reconhecimento de Voz + Lógica)
        function startVoiceChat() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Voz não suportada.");

            const recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            
            recognition.onstart = () => { output.innerText = "Ouvindo..."; };
            
            recognition.onresult = (event) => {
                const speech = event.results[0][0].transcript.toLowerCase();
                processIntelligence(speech);
            };
            
            recognition.start();
        }

        function processIntelligence(input) {
            let reply = "";
            // Lógica de processamento de linguagem
            if (input.includes("quem é você")) reply = "Sou uma inteligência artificial integrada, projetada para suporte visual e diálogo autônomo.";
            else if (input.includes("ajuda")) reply = "Estou monitorando o ambiente. Posso descrever objetos ou manter uma conversa para suporte cognitivo.";
            else if (input.includes("tempo") || input.includes("horas")) reply = `Agora são ${new Date().getHours()} horas e ${new Date().getMinutes()} minutos.`;
            else reply = `Você disse "${input}". Analisei sua fala e estou aguardando o próximo comando para processar.`;

            updateAI(reply);
        }

        function updateAI(text) {
            output.innerText = text;
            speak(text);
        }

        function speak(text) {
            synth.cancel();
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'pt-BR';
            speech.rate = 1.0;
            synth.speak(speech);
        }

        function toggleContrast() {
            document.body.classList.toggle('high-contrast');
        }

        init();
    </script>
</body>
</html>
